{% extends 'base.html' %}

{% block title %}Login - AI Resume Ranker{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="glass-card p-5 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="fa-solid fa-graduation-cap fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">HR Portal</h2>
                <p class="text-muted">Sign in to manage resumes & rank candidates</p>
            </div>
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 mb-3 rounded-3">Sign In</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

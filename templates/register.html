{% extends 'base.html' %}

{% block title %}Register - AI Resume Ranker{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="glass-card p-5 shadow-lg border-0">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Register a new Recruiter or Admin profile</p>
            </div>
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" name="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0 ps-0" id="email" name="email" placeholder="name@company.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" placeholder="Min. 8 characters" required minlength="8">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 mb-3 rounded-3">Register</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="text-muted mb-0">Already registered? <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Sign in here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
